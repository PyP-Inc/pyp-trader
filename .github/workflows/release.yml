name: Build and Release EAs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - platform: mt4
            file: PyP_EA.mq4
            output: PyP_EA.ex4
            installer: https://download.mql5.com/cdn/web/metaquotes.software.corp/mt4/mt4setup.exe
            editor: C:\Program Files (x86)\MetaTrader 4\metaeditor.exe
          - platform: mt5
            file: PyP_EA.mq5
            output: PyP_EA.ex5
            installer: https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe
            editor: C:\Program Files\MetaTrader 5\MetaEditor64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install MetaTrader
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "${{ matrix.installer }}" -OutFile "$env:TEMP\setup.exe"
          Start-Process "$env:TEMP\setup.exe" -ArgumentList "/auto" -Wait
          Start-Sleep -Seconds 45

      - name: Compile EA
        shell: powershell
        run: |
          $src = "${{ github.workspace }}\${{ matrix.platform }}\${{ matrix.file }}"
          $out = "${{ github.workspace }}\${{ matrix.platform }}"
          $proc = Start-Process -FilePath "${{ matrix.editor }}" `
            -ArgumentList "/compile:`"$src`"", "/log:`"$out\compile.log`"" `
            -Wait -PassThru
          if (Test-Path "$out\compile.log") { Get-Content "$out\compile.log" }
          if (-not (Test-Path "$out\${{ matrix.output }}")) {
            Write-Host "Compile failed"
            exit 1
          }
          Write-Host "Compiled successfully"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.platform }}/${{ matrix.output }}
          body: |
            ## PyP EA ${{ github.ref_name }}

            ### Installation
            1. Download `PyP_EA.ex4` (MT4) or `PyP_EA.ex5` (MT5)
            2. Copy to your MetaTrader `Experts` folder
            3. Restart MetaTrader, attach to chart, enter your EA Token from the [PyP dashboard](https://pyp.stanlink.online)
            4. Allow WebRequests for `https://api.pyp.stanlink.online` in Tools → Options → Expert Advisors
