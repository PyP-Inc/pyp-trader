name: Build and Release EAs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MetaTrader 5
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "$env:TEMP\mt5setup.exe"
          Start-Process "$env:TEMP\mt5setup.exe" -ArgumentList "/auto" -Wait
          Start-Sleep -Seconds 45

      - name: Compile MT5 EA
        shell: powershell
        run: |
          $metaeditor = "C:\Program Files\MetaTrader 5\MetaEditor64.exe"
          if (-not (Test-Path $metaeditor)) {
            Write-Host "MetaEditor not found at expected path"
            exit 1
          }
          Write-Host "Compiling with: $metaeditor"
          & $metaeditor /compile:"${{ github.workspace }}\mt5\PyP_EA.mq5" /log
          Start-Sleep -Seconds 5

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          if (Test-Path "mt5\PyP_EA.ex5") { Copy-Item "mt5\PyP_EA.ex5" artifacts\ }
          Get-ChildItem artifacts\
          if ((Get-ChildItem artifacts\).Count -eq 0) { Write-Host "No artifacts found"; exit 1 }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## PyP EA ${{ github.ref_name }}

            ### Installation
            1. Download `PyP_EA.ex5` (MT5)
            2. Copy to your MetaTrader `Experts` folder
            3. Restart MetaTrader, attach to chart, enter your EA Token from the [PyP dashboard](https://pyp.stanlink.online)
            4. Allow WebRequests for `https://api.pyp.stanlink.online` in Tools → Options → Expert Advisors
