name: Build and Release EAs

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MetaTrader 5
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "$env:TEMP\mt5setup.exe"
          Start-Process "$env:TEMP\mt5setup.exe" -ArgumentList "/auto" -Wait
          Start-Sleep -Seconds 30

      - name: Compile MT4 EA
        shell: powershell
        run: |
          $metaeditor4 = "C:\Program Files\MetaTrader 4\metaeditor.exe"
          if (Test-Path $metaeditor4) {
            & $metaeditor4 /compile:"${{ github.workspace }}\mt4\PyP_EA.mq4" /log
          } else {
            Write-Host "MT4 MetaEditor not found, skipping MT4 compile"
          }

      - name: Compile MT5 EA
        shell: powershell
        run: |
          $metaeditor5 = Get-ChildItem "C:\Program Files\MetaTrader 5" -Filter "metaeditor64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($metaeditor5) {
            & $metaeditor5.FullName /compile:"${{ github.workspace }}\mt5\PyP_EA.mq5" /log
          } else {
            Write-Host "MT5 MetaEditor not found"
            exit 1
          }

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          if (Test-Path "mt4\PyP_EA.ex4") { Copy-Item "mt4\PyP_EA.ex4" artifacts\ }
          if (Test-Path "mt5\PyP_EA.ex5") { Copy-Item "mt5\PyP_EA.ex5" artifacts\ }
          Get-ChildItem artifacts\

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## PyP EA ${{ github.ref_name }}

            ### Installation
            1. Download the EA for your platform (`PyP_EA.ex4` for MT4, `PyP_EA.ex5` for MT5)
            2. Copy to your MetaTrader `Experts` folder
            3. Restart MetaTrader, attach to chart, enter your EA Token from the PyP dashboard
            4. Allow WebRequests for `https://api.pyp.stanlink.online` in Tools → Options → Expert Advisors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
